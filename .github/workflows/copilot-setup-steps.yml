name: "Copilot Setup Steps"

# Run automatically when this file changes (so CI validates the setup), and
# allow manual runs from the Actions tab for ad-hoc verification.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest
    # 59 is the maximum value allowed for copilot-setup-steps jobs (per GitHub docs).
    timeout-minutes: 59

    # Full permissions so Copilot can read, write, and interact with all
    # repository resources (issues, PRs, checks, packages, etc.).
    permissions: write-all

    steps:
      # -----------------------------------------------------------------------
      # 1. Source code
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. JDK – Temurin 17 (Adoptium) with Gradle cache
      #    https://github.com/adoptium/temurin-build
      # -----------------------------------------------------------------------
      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # -----------------------------------------------------------------------
      # 3. Android SDK – cmdline-tools PATH, license acceptance, and SDK
      #    platform install.
      #
      #    sdkmanager lives in $ANDROID_HOME/cmdline-tools/latest/bin/ which
      #    is not on PATH by default on the GitHub-hosted ubuntu-latest runner,
      #    so we add it to PATH first and then use it for all subsequent calls.
      #
      #    Android 16 (API 36) — platform-stable, available in the default
      #    (stable) sdkmanager channel.
      # -----------------------------------------------------------------------
      - name: Add Android SDK cmdline-tools to PATH
        run: echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> "$GITHUB_PATH"

      # Cache the SDK platform so subsequent runs skip the download.
      - name: Cache Android SDK platform
        uses: actions/cache@v4
        with:
          path: ${{ env.ANDROID_HOME }}/platforms/android-36
          key: android-sdk-api36-${{ runner.os }}-v1

      - name: Accept Android SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses

      - name: Install Android SDK platform 36
        run: |
          [ -d "$ANDROID_HOME/platforms/android-36" ] || \
            "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-36"

      # -----------------------------------------------------------------------
      # 4. Build the debug APK.
      #    --build-cache  re-uses task outputs across runs (stored in ~/.gradle).
      #    --parallel     compiles independent modules concurrently.
      # -----------------------------------------------------------------------
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --build-cache --parallel

