name: "Copilot Setup Steps"

# Run automatically when this file changes (so CI validates the setup), and
# allow manual runs from the Actions tab for ad-hoc verification.
on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  # The job MUST be called `copilot-setup-steps` or it will not be picked up by Copilot.
  copilot-setup-steps:
    runs-on: ubuntu-latest
    # 59 is the maximum value allowed for copilot-setup-steps jobs (per GitHub docs).
    timeout-minutes: 59

    # Full permissions so Copilot can read, write, and interact with all
    # repository resources (issues, PRs, checks, packages, etc.).
    permissions: write-all

    steps:
      # -----------------------------------------------------------------------
      # 1. Source code
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. JDK – Temurin 17 (Adoptium) with Gradle cache
      #    https://github.com/adoptium/temurin-build
      # -----------------------------------------------------------------------
      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # -----------------------------------------------------------------------
      # 3. Android SDK – accept licenses and install the SDK platform BEFORE
      #    building so that compileSdk = 36 resolves correctly.
      #
      #    sdkmanager lives in $ANDROID_HOME/cmdline-tools/latest/bin/ which
      #    is not on PATH by default on the GitHub-hosted ubuntu-latest runner,
      #    so we add it to PATH first and then use it for all subsequent calls.
      #
      #    Android 16 (API 36) — platform-stable, available in the default
      #    (stable) sdkmanager channel.
      #
      #    To switch to Android 17 (API 37, "Cinnamon Bun" Beta) instead:
      #      • Add --channel=3 to every sdkmanager call below
      #      • Replace all "android-36" occurrences with "android-37"
      #      • Use build-tools;37.0.0 in the sdkmanager install line
      # -----------------------------------------------------------------------
      - name: Add Android SDK cmdline-tools to PATH
        run: echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> "$GITHUB_PATH"

      - name: Accept Android SDK licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses

      - name: Install Android SDK platform 36
        run: |
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-36"

      # -----------------------------------------------------------------------
      # 4. Build the debug APK so Copilot can install / inspect it immediately
      # -----------------------------------------------------------------------
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      # -----------------------------------------------------------------------
      # 5. Android emulator – hardware acceleration (KVM)
      # -----------------------------------------------------------------------
      - name: Enable KVM hardware acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # -----------------------------------------------------------------------
      # 6. Install emulator, platform-tools, and the API 36 system image.
      #    google_apis;x86_64 is the only available variant for API 36
      #    ("default" images are absent for Android 16 — known upstream issue).
      # -----------------------------------------------------------------------
      - name: Install Android emulator, platform-tools, and system image
        run: |
          "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" \
            "emulator" \
            "platform-tools" \
            "system-images;android-36;google_apis;x86_64"

      # Expose adb / emulator on PATH for Copilot and subsequent steps
      - name: Add Android SDK tools to PATH
        run: |
          echo "$ANDROID_HOME/emulator"       >> "$GITHUB_PATH"
          echo "$ANDROID_HOME/platform-tools" >> "$GITHUB_PATH"

      # -----------------------------------------------------------------------
      # 7. Create the Android Virtual Device (AVD)
      # -----------------------------------------------------------------------
      - name: Create Android Virtual Device
        run: |
          echo "no" | "$ANDROID_HOME/cmdline-tools/latest/bin/avdmanager" create avd \
            --name "copilot_avd" \
            --package "system-images;android-36;google_apis;x86_64" \
            --device "pixel_6" \
            --force

      # -----------------------------------------------------------------------
      # 8. Start the emulator in the background (headless, software GPU)
      # -----------------------------------------------------------------------
      - name: Start Android emulator
        # -accel on:    use KVM hardware acceleration (enabled in step 5).
        # -memory 2048: 2 GiB is sufficient for the Pixel 6 AVD profile without
        # exhausting the CI runner's available RAM.
        run: |
          nohup "$ANDROID_HOME/emulator/emulator" \
            -avd copilot_avd \
            -no-window \
            -no-audio \
            -no-boot-anim \
            -gpu swiftshader_indirect \
            -accel on \
            -camera-back none \
            -camera-front none \
            -memory 2048 \
            > /tmp/emulator.log 2>&1 &
          echo "Emulator launched (PID $!)"

      # -----------------------------------------------------------------------
      # 9. Wait for the emulator to finish booting (5-minute timeout)
      # -----------------------------------------------------------------------
      - name: Wait for emulator to boot
        run: |
          # Give adb up to 60 s to detect the device before polling boot props.
          if ! timeout 60 adb wait-for-device; then
            echo "adb wait-for-device timed out — emulator log:"
            cat /tmp/emulator.log
            exit 1
          fi
          MAX_WAIT=300
          WAITED=0
          until adb shell getprop sys.boot_completed 2>/dev/null | grep -q "1" && \
                adb shell getprop dev.bootcomplete    2>/dev/null | grep -q "1"; do
            if [ "$WAITED" -ge "$MAX_WAIT" ]; then
              echo "Emulator boot timed out after ${MAX_WAIT}s — emulator log:"
              cat /tmp/emulator.log
              exit 1
            fi
            echo "Waiting for emulator to boot… (${WAITED}s elapsed)"
            sleep 5
            WAITED=$((WAITED + 5))
          done
          adb shell input keyevent 82
          echo "Emulator is ready"
          adb devices -l

      # -----------------------------------------------------------------------
      # 10. Install the debug APK – verbose output aids APK debugging
      # -----------------------------------------------------------------------
      - name: Install debug APK on emulator
        run: |
          adb install -r -t -d \
            app/build/outputs/apk/debug/app-debug.apk
          echo "=== Installed packages (agenthq) ==="
          adb shell pm list packages | grep agenthq || echo "(package not found after install)"
          echo "=== APK install complete ==="

      # -----------------------------------------------------------------------
      # 11. Launch the app and verify it starts without crashing
      # -----------------------------------------------------------------------
      - name: Launch app on emulator
        run: |
          # Start the main Activity via am start
          adb shell am start -n "com.example.agenthq.debug/com.example.agenthq.MainActivity"
          echo "=== am start issued; waiting 5 s for the app to render ==="
          sleep 5
          # Confirm the activity is in the foreground
          CURRENT=$(adb shell dumpsys activity activities \
            | grep -E "mResumedActivity|ResumedActivity" | head -1 || true)
          echo "Resumed activity: $CURRENT"
          if echo "$CURRENT" | grep -q "agenthq"; then
            echo "✅  App is running in the foreground"
          else
            echo "⚠️  App may not be in the foreground – check the screenshot below"
          fi

      # -----------------------------------------------------------------------
      # 12. Capture a screenshot of the running app
      # -----------------------------------------------------------------------
      - name: Take screenshot of running app
        run: |
          mkdir -p /tmp/screenshots
          adb exec-out screencap -p > /tmp/screenshots/app-debug-screenshot.png
          echo "Screenshot saved to /tmp/screenshots/app-debug-screenshot.png"
          ls -lh /tmp/screenshots/

      - name: Upload app screenshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-screenshot
          path: /tmp/screenshots/app-debug-screenshot.png
          if-no-files-found: warn

      # -----------------------------------------------------------------------
      # 13. Capture logcat output for crash / error diagnostics
      # -----------------------------------------------------------------------
      - name: Capture logcat output
        if: always()
        run: |
          mkdir -p /tmp/logs
          # Dump the buffered logcat (all buffers) since device boot
          adb logcat -d -b all \
            | grep -E "agenthq|AndroidRuntime|FATAL|ActivityManager" \
            > /tmp/logs/app-logcat.txt 2>&1 || true
          echo "=== Last 50 lines of app logcat ==="
          tail -50 /tmp/logs/app-logcat.txt || true

      - name: Upload logcat artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-logcat
          path: /tmp/logs/app-logcat.txt
          if-no-files-found: warn

