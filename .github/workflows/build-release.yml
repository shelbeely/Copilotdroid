name: Build & Release

# Triggers: branch pushes, PRs to main, version tags, and manual dispatch
on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Build debug APK (always) and release APK (on tag pushes only)
  # ---------------------------------------------------------------------------
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # Release APK steps — only run when a version tag is pushed
      - name: Build release APK
        if: startsWith(github.ref, 'refs/tags/v')
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload release APK artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/app-release-unsigned.apk
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Job 2: Create a GitHub Release and attach both APKs (tag pushes only)
  # ---------------------------------------------------------------------------
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download debug APK artifact
        uses: actions/download-artifact@v4
        with:
          name: debug-apk
          path: artifacts/debug

      - name: Download release APK artifact
        uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: artifacts/release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Copilotdroid ${{ github.ref_name }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/debug/app-debug.apk
            artifacts/release/app-release-unsigned.apk
          token: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Job 3: AI-powered failure analysis using GitHub Models API (gpt-4o)
  # ---------------------------------------------------------------------------
  debug-failure:
    name: AI Build Failure Analysis
    runs-on: ubuntu-latest
    needs: build
    if: failure()
    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Fetch the failed job's logs via the GitHub REST API and store them
      - name: Download build logs
        uses: actions/github-script@v7
        with:
          script: |
            const { data: jobs } = await github.rest.actions.listJobsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
              filter: 'latest',
            });

            // Find the first failed job (the 'build' job)
            const failedJob = jobs.jobs.find(j => j.conclusion === 'failure');
            if (!failedJob) {
              core.warning('No failed job found — skipping log download.');
              return;
            }

            // Download raw logs for the failed job
            const logsResponse = await github.rest.actions.downloadJobLogsForWorkflowRun({
              owner: context.repo.owner,
              repo: context.repo.repo,
              job_id: failedJob.id,
            });

            // Extract the last 200 lines to stay within env-var size limits
            const allLines = String(logsResponse.data).split('\n');
            const last200 = allLines.slice(-200).join('\n');

            // Persist logs for subsequent steps
            core.exportVariable('BUILD_LOGS', last200);

            const fs = require('fs');
            fs.writeFileSync('build-failure.txt', last200, 'utf8');
            core.info(`Saved ${last200.split('\n').length} log lines to build-failure.txt`);

      # Call GitHub Models API (gpt-4o) to analyse the failure and report results
      - name: AI analysis of build failure
        uses: actions/github-script@v7
        env:
          # Expose the token as a masked env var so it never appears in logs
          GH_MODELS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const buildLogs = process.env.BUILD_LOGS || '';
            if (!buildLogs.trim()) {
              core.warning('BUILD_LOGS is empty — skipping AI analysis.');
              return;
            }

            const systemPrompt =
              'You are an expert Android/Gradle build engineer. Analyze the following build ' +
              'failure log and provide: 1) Root cause, 2) Specific fix with code snippet if ' +
              'applicable, 3) Steps to resolve.';

            let analysisText = '*(AI analysis unavailable)*';

            try {
              const response = await fetch(
                'https://models.inference.ai.azure.com/chat/completions',
                {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${process.env.GH_MODELS_TOKEN}`,
                  },
                  body: JSON.stringify({
                    model: 'gpt-4o',
                    messages: [
                      { role: 'system', content: systemPrompt },
                      { role: 'user',   content: buildLogs },
                    ],
                    max_tokens: 1024,
                  }),
                }
              );

              if (!response.ok) {
                const errorBody = await response.text();
                core.warning(`GitHub Models API returned ${response.status}: ${errorBody}`);
              } else {
                const data = await response.json();
                analysisText = data?.choices?.[0]?.message?.content ?? analysisText;
              }
            } catch (err) {
              core.warning(`Failed to call GitHub Models API: ${err.message}`);
            }

            // Write analysis to the workflow step summary
            await core.summary
              .addHeading('🤖 AI Build Failure Analysis', 2)
              .addRaw(analysisText)
              .addEOL()
              .write();

            // If this run was triggered by a pull request, post as a PR comment
            const prNumber =
              context.payload?.pull_request?.number ??
              context.payload?.number ??
              null;

            if (prNumber) {
              const body =
                '## 🤖 AI Build Failure Analysis\n\n' +
                analysisText +
                '\n\n---\n*Analysis generated by GitHub Models (gpt-4o)*';

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body,
              });
              core.info(`Posted AI analysis as comment on PR #${prNumber}`);
            }
